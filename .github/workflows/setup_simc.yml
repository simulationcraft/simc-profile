name: setup_simc

on:
  workflow_call

jobs:
  setup_simc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: simulationcraft/simc
          path: ${{ runner.workspace }}/simc/
          sparse-checkout: 'LICENSE'

      - name: cache_key
        run: |
          cd ${{ runner.workspace }}/simc/
          echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          cd ${{ runner.workspace }}

      - uses: actions/cache/restore@v5
        id: restore_cache
        with:
          path: ${{ runner.workspace }}/simc/b/ninja/simc
          key: simc-clang++-18-cpp17-${{ env.SHA }}

      - uses: ./.github/workflows/build
        if: steps.restore_cache.outcome == 'failure'
