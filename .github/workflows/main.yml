name: CI

on: [pull_request, push]

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ runner.workspace }}/simc-profile/

      - name: validate
        run: |
          git diff-tree --no-commit-id --name-only HEAD -r | xargs python ${{ runner.workspace }}/simc-profile/scripts/validate.py

      # - uses: ./.github/workflows/setup_simc.yml
