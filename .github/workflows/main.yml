name: CI

on: [pull_request, push]

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ runner.workspace }}/simc-profile/
          fetch-depth: 2

      - name: validate
        run: |
          tree
          cd ${{ runner.workspace }}/simc-profile/
          git diff --name-only HEAD^1 HEAD | xargs python ${{ runner.workspace }}/simc-profile/scripts/validate.py

      # - uses: ./.github/workflows/setup_simc.yml
