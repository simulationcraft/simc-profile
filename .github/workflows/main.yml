name: CI

on: [pull_request, push]

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: modified_files
        continue-on-error: true
        run: |
          files=$(git diff --diff-filter=AM --no-commit-id --name-only HEAD~1 -- '***.simc' | xargs)
          echo $files
          # if [[ -n "$files" ]]; then
          echo "MODIFIED_FILES=$files" >> $GITHUB_ENV
          # else
          #   exit 2
          # fi

      - name: validate_python
        run: |
          python ${{ runner.workspace }}/simc-profile/scripts/validate.py \
          ${{ env.MODIFIED_FILES }}

      - uses: ./.github/workflows/setup_simc
        id: setup

      - name: validate_simc
        if: steps.setup.outputs.rebuilt-simc != 'true'
        run: |
          python ${{ runner.workspace }}/simc-profile/scripts/execute.py \
          ${{ env.MODIFIED_FILES }} -b ${{ runner.workspace }}/simc-profile/simc-profile/simc/b/ninja/simc \
          --save .

      - name: validate_simc
        if: steps.setup.outputs.rebuilt-simc == 'true'
        run: |
          find ${{ runner.workspace }}/simc-profile/profiles -type f \
          | xargs python ${{ runner.workspace }}/simc-profile/scripts/execute.py \
          ${{ env.MODIFIED_FILES }} -b ${{ runner.workspace }}/simc-profile/simc-profile/simc/b/ninja/simc \
          --save .

      - name: execute_simc
        if: steps.setup.outputs.rebuilt-simc != 'true' && github.event_name == 'push' && ( success() || failure() ) && github.repository == 'simulationcraft/simc-profile' && github.ref_name == github.event.repository.default_branch
        run: |
          python ${{ runner.workspace }}/simc-profile/scripts/execute.py \
          ${{ env.MODIFIED_FILES }} -b ${{ runner.workspace }}/simc-profile/simc-profile/simc/b/ninja/simc \
          --execute

      - name: execute_simc
        if: steps.setup.outputs.rebuilt-simc == 'true' && github.event_name == 'push' && ( success() || failure() ) && github.repository == 'simulationcraft/simc-profile' && github.ref_name == github.event.repository.default_branch
        run: |
          find ${{ runner.workspace }}/simc-profile/profiles -type f \
          | xargs python ${{ runner.workspace }}/simc-profile/scripts/execute.py \
          ${{ env.MODIFIED_FILES }} -b ${{ runner.workspace }}/simc-profile/simc-profile/simc/b/ninja/simc \
          --execute
