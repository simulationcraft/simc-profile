name: build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: simulationcraft/simc
          path: simc/
          sparse-checkout: !SpellDataDump/

      - name: configure
        run: |
          cmake -H. -B'${{ runner.workspace }}/simc/b/ninja' -GNinja -DBUILD_GUI=OFF
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=clang++-18
          -DCMAKE_CXX_STANDARD=17

      - name: build
        run: |
          ninja -C '${{ runner.workspace }}/simc/b/ninja'

      - name: ident
        run: |
          cd '${{ runner.workspace }}/simc'
          git rev-parse HEAD

      - uses: actions/cache@v5
        with:
          path: ${{ runner.workspace }}/simc/b/ninja/simc
          key: simc-clang++-18-cpp17-${{ github.sha }}
