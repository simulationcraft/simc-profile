name: build

runs:
  using: 'composite'

  steps:
    - name: configure
      shell: bash
      run: |
        cmake -H. \
        -B'simc/b/ninja' -GNinja -DBUILD_GUI=OFF \
        -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-18 \
        -DCMAKE_CXX_STANDARD=17 -DSC_NO_NETWORKING=ON

    - name: build
      shell: bash
      run: |
        ninja -C 'simc/b/ninja'

    - name: cache_key
      shell: bash
      run: |
        cd simc/
        echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
        cd ..

    - uses: actions/cache@v5
      with:
        path: ${{ runner.workspace }}/b/ninja/simc
        key: simc-clang++-18-cpp17-${{ env.SHA }}
